<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Poured Memories, LLC - Bartending Services</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Italiana&display=swap');
            :root {
                --color1: #AD8330;
                --color2: #3E3D3D;
                --color3: #E7CBBC;
            }

            .accent {
                color: var(--color1)
            }
            
            body {
                margin: 0;
                padding: 0;
                font-family: "italiana", system-ui;
                font-weight: bold;
                background: white;
                color: var(--color1);
            }
            
            .hero {
                background-size: cover;
                background-position: 38% center;
                background-repeat: no-repeat;
                display: flex;
            }

            .content {
                position: absolute;
                display: flex;
                width: 100%;
                height: 100%;
                justify-content: center;
                align-items: center;
            }

            .content h2 {
                color: white;
                font-size: 48pt;
            }

            h2 {
                font-size: 32pt;
            }

            h3 {
                font-size: 18pt;
                margin: 10px auto;
            }

            .core {
                max-width: 400px;
                margin: auto 30px;
            }

            form {
                
            }

            input, textarea {
                border-radius: 20px;
                border-color: var(--color1);
                font-size: 16pt;
                padding: 5px;
            }

            .group {
                display: flex;
                flex-direction: column-reverse;
                margin: auto 10px;
            }

            .group button {
                width: 100px;
                height: 50px;
                margin: 30px 0px;
                background: none;
                color: var(--color1);
                border-radius: 10px;
                border-color: var(--color1);
            }

            .name input {
                max-width: 140px;
            }

            .name {
                display: flex;
                width: 100%;
                justify-content: space-between;
            }

            .footer {
                background: white;
            }

            .footer p {
                margin: 0px auto;
                font-size: 10pt;
                color: var(--color1);
            }

            .foot-wrapper {
                display: flex;
                align-items: center;
                flex-direction: column;
                padding: 30px;
            }

            .navi {
                padding: 30px;
                display: flex;
                width: 100%;
                justify-content: space-between;
                flex-direction: row-reverse;
                max-height: 100px;
            }

            .navi input {
                display: none;
            }

            .navi label {
                filter: invert(0);
                z-index: 1000;
            }

            .navi input:checked ~ label {
                filter: invert(1);
            }

            .navi input:checked ~ .mobile-droplist {
                display: flex;
            }

            .navi input:checked ~ h1 {
                color: black;
            }
            
            .navi h1 {
                margin: 0px;
                color: var(--color1);
                font-size: 16pt;
                z-index: 1000;
            }

            .mobile-droplist {
                position: absolute;
                background: var(--color3); 
                height: 100vh;
                width: 100vw;
                display: none;
                z-index: 1;
                margin: -30px;
                justify-content: center;
                align-items: center;
            }

            .mobile-droplist ul {
                padding: 0;
                list-style: none;
            }

            .mobile-droplist li {
                margin: 30px auto;
                font-size: 24pt;
                text-align: center;
            }

            .mobile-droplist a {
                color: var(--color2);
                text-decoration: none;
            }

            .wrapper {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .wrapper img {
                width: 100%;
                margin: 15px auto;
                border-radius: 30px;
            }

            @media (min-width: 800px) {
                .core {

                    display: flex;
                    max-width: 100%;
                    justify-content: center;
                }
                
                .footer {
                    position: absolute;
                    bottom: 0;
                    width: 100%;
                }
                .navi {
                    flex-direction: row;
                    align-items: center;
                    padding: 0 30px;
                }

                .navi h1 {
                    font-size: 24pt;
                    min-width: 300px;
                }
                
                .navi label {
                    display: none;
                }

                .mobile-droplist {
                    display: flex;
                    justify-content: left;
                    position: relative;
                    background: none;
                    width: 100%;
                    height: auto;
                    margin-left: 30px;
                    padding: 0px;
                }

                .mobile-droplist ul {
                    display: flex;
                    gap: 30px;
                }

                .mobile-droplist li {
                    font-size: 16pt;
                }

                .wrapper {
                    flex-direction: column;
                    justify-content: center;
                    max-width: none;
                }
    
                .wrapper img {
                    max-height: 200px;
                    width: auto;
                    border-radius: 30px;
                }

            }
        </style>
    </head>
    <body>
        <div class="hero">
            <div class="navi">
                <input type="checkbox" id="toggle">
                <label for="toggle">
                    <img src="https://img.icons8.com/material-outlined/24/menu--v3.png" alt="toggle icon">
                </label>
                <h1>POURED MEMORIES</h1>
                <div class="mobile-droplist">
                    <ul>
                        <li><a href="/">Home</a></li>
                        <li><a href="/about/">About</a></li>
                        <li><a href="/services/">Services</a></li>
                        <li><a href="/contact/" style="text-decoration: underline;"">Contact</a></li>
                        <li><a href="/gallery/">Gallery</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="core">
            <div class="wrapper">
                <h2>CONTACT US</h2>
                <h3>DON'T SEE WHAT YOU'RE LOOKING FOR?</h3>
                <h3>NO WORRIES!</h3>
                <h3>LET'S WORK ON IT TOGETHER!</h3>
            </div>
            <form>
                <p style="padding-left: 10px;">Name</p>
                <div class="name">
                    <div class="group">
                        <input id="first-name" type="text" required/>
                        <label for"first-name">First Name (required)</label>
                    </div>
                    <div class="group">
                        <input id="last-name" type="text" required/>
                        <label for"last-name">Last Name (required)</label>
                    </div>
                </div>
                <div class="group">
                    <input id="mail" type="email" required/>
                    <label for"mail">Email (required)</label>
                </div>
                <div class="group">
                    <input type="tel" id="phone" name="phone" class="glass"  pattern="^\+?[0-9\s\-\(\)]{7,16}$" required/>
                    <label for"phone">Phone Number (required)</label>
                </div>
                <div class="group">
                    <input id="num" type="num" />
                    <label for"num">Number of Guests</label>
                </div>
                <p style="padding-left: 10px;">Message (required)</p>
                <div class="group">
    		      <textarea class="glass" id="comments" name="comments" row="5" column="33" style="padding: 30px"></textarea>
                </div>
                <div class="group">
                    <button>Send</button>
                </div>
            </form>
        </div>
        <div class="footer">
            <div class="foot-wrapper">
                <p>LA | OC | SGV | SFV </p>
                <p>pouredmemories@gmail.com</p>
                <p>626.628.4881</p>
            </div>
        </div>
    </body>
</html>
