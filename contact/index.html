<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="https://images.squarespace-cdn.com/content/v1/6698834996b6057e16d61abc/75cdf67c-43ee-4157-a238-2b6d5ba3a49b/favicon.ico?format=100w"/>
        <meta name="format-detection" content="telephone=no">
        <title>Poured Memories, LLC - Bartending Services</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Italiana&display=swap');
            :root {
                --color1: #AD8330;
                --color2: #3E3D3D;
                --color3: #E7CBBC;
                --color4: #C5A86E;
            }

            .accent {
                color: var(--color1);
            }

            .accent2 {
                color: var(--color4);
            }

            p {
                font-size: 16pt;
            }
            
            body {
                margin: 0;
                padding: 0;
                font-family: "italiana", system-ui;
                font-weight: bold;
                background: white;
                color: var(--color1);
            }
            
            .hero {
                background-size: cover;
                background-position: 38% center;
                background-repeat: no-repeat;
                display: flex;
            }

            .content {
                position: absolute;
                display: flex;
                width: 100%;
                height: 100%;
                justify-content: center;
                align-items: center;
            }

            .content h2 {
                color: white;
                font-size: 48pt;
            }

            h2 {
                font-size: 32pt;
            }

            h3 {
                font-size: 18pt;
                margin: 10px auto;
            }

            .core {
                max-width: 380px;
            }

            .core-wrapper {
                display: flex;
                justify-content: center;
            }

            input, textarea, select {
                border-radius: 20px;
                border-color: var(--color1);
                color: var(--color1);
                font-size: 16pt;
                padding: 5px;
                width: 100%;
                box-sizing: border-box;
            }

            textarea {
                padding: 15px;
            }

            #day {
                width: 200px;
                color: var(--color1);
            }

            .group {
                display: flex;
                flex-direction: column-reverse;
                margin: 15px auto;
            }

            .group button {
                width: 100px;
                height: 50px;
                margin: 30px 0px;
                background: none;
                color: var(--color1);
                border-radius: 10px;
                border-color: var(--color1);
            }

            .name {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .name .group {
                margin: 0px;
            }

            .footer {
                background: white;
            }

            .footer p {
                margin: 0px auto;
                font-size: 10pt;
                color: var(--color1);
            }

            .foot-wrapper {
                display: flex;
                align-items: center;
                flex-direction: column;
                padding: 30px;
            }

            .navi {
                padding: 30px;
                display: flex;
                width: 100%;
                justify-content: space-between;
                flex-direction: row-reverse;
                max-height: 100px;
            }

            .navi input {
                display: none;
            }

            .navi label {
                filter: invert(0);
                z-index: 1000;
            }

            .navi input:checked ~ label {
                filter: invert(0);
                position:fixed;
            }

            .navi input:checked ~ .mobile-droplist {
                display: flex;
            }

            .navi input:checked ~ h1 {
                color: black;
                position: fixed;
                left: 30px;
            }
            
            .navi h1 {
                margin: 0px;
                color: var(--color1);
                font-size: 16pt;
                z-index: 1000;
            }

            .mobile-droplist {
                position: fixed;
                background: var(--color3); 
                height: 100vh;
                width: 100vw;
                display: none;
                z-index: 1;
                margin: -30px;
                justify-content: center;
                align-items: center;
            }

            .mobile-droplist ul {
                padding: 0;
                list-style: none;
            }

            .mobile-droplist li {
                margin: 30px auto;
                font-size: 24pt;
                text-align: center;
            }

            .mobile-droplist a {
                color: var(--color2);
                text-decoration: none;
            }

            .wrapper {
                display: flex;
                justify-content: center;
            }

            .headings {
                display: flex;
                flex-direction: column;
                max-width: 250px;
                align-items: center;
                text-align: center;   
            }

            @media (min-width: 800px) {
                .core {
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                    max-width: none;
                }

                .headings {
                    max-width: none;
                }
                
                .navi {
                    flex-direction: row;
                    align-items: center;
                    padding: 0 30px;
                }

                .navi h1 {
                    font-size: 24pt;
                    min-width: 300px;
                }
                
                .navi label {
                    display: none;
                }

                .mobile-droplist {
                    display: flex;
                    justify-content: left;
                    position: relative;
                    background: none;
                    width: 100%;
                    height: auto;
                    margin-left: 30px;
                    padding: 0px;
                }

                .mobile-droplist ul {
                    display: flex;
                    gap: 30px;
                }

                .mobile-droplist li {
                    font-size: 16pt;
                }

                .mobile-droplist a:hover {
                    color: lightgray;
                    text-decoration: underline;
                }

                .wrapper {
                    flex-direction: column;
                    justify-content: center;
                    max-width: none;
                    width: 100%;
                }
    
                .wrapper img {
                    max-height: 200px;
                    width: auto;
                    border-radius: 30px;
                }

            }
        </style>
    </head>
    <body>
        <div class="hero">
            <div class="navi">
                <input type="checkbox" id="toggle">
                <label for="toggle">
                    <img src="https://img.icons8.com/material-outlined/24/menu--v3.png" alt="toggle icon">
                </label>
                <h1>POURED MEMORIES</h1>
                <div class="mobile-droplist">
                    <ul>
                        <li><a href="/lvllc/">Home</a></li>
                        <li><a href="/lvllc/about/">About</a></li>
                        <li><a href="/lvllc/services/">Services</a></li>
                        <li><a href="/lvllc/contact/" style="text-decoration: underline;">Contact</a></li>
                        <li><a href="/lvllc/gallery/">Gallery</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="core-wrapper">
            <div class="core">
                <div class="wrapper">
                    <div class="headings">
                        <h2>CONTACT US</h2>
                        <h3>DON'T SEE WHAT YOU'RE LOOKING FOR?</h3>
                        <h3>NO WORRIES!</h3>
                        <h3>LET'S WORK ON IT TOGETHER!</h3>
                    </div>
                </div>
                <form action="https://formspree.io/f/mwvdbndl" method="POST">
                    <p>Name</p>
                    <div class="name">
                        <div class="group">
                            <input id="first-name" type="text" name="first-name" required/>
                            <label for="first-name">First Name <span class="accent2">(required)</span></label>
                        </div>
                        <div class="group">
                            <input id="last-name" type="text" name="last-name" required/>
                            <label for="last-name">Last Name <span class="accent2">(required)</span></label>
                        </div>
                    </div>
                    <div class="group">
                        <input id="mail" type="email" name="email" required/>
                        <label for="mail">Email <span class="accent2">(required)</span></label>
                    </div>
                    <div class="group">
                        <input type="tel" id="phone" name="phone" class="glass"  pattern="^\+?[0-9\s\-\(\)]{7,16}$" required/>
                        <label for="phone">Phone Number <span class="accent2">(required)</span></label>
                    </div>
                    <div class="group">
                        <input id="day" type="date" name="date" />
                        <label for="day">Date of Event</label>
                    </div>
                    <div class="group">
                        <input id="num" type="number" name="guest-number" />
                        <label for="num">Number of Guests</label>
                    </div>
                    <p>Message <span class="accent2">(required)</span></p>
                    <div class="group">
        		      <textarea class="glass" id="comments" name="comments" rows="3" col="33"></textarea>
                    </div>
                    <p>Service/Package</p>
                    <label for="package"><span class="accent2">What service are you looking for?</span></label>
                    <select id="package">
                        <option value="" disabled selected hidden>Select an option</option>
                        <option value="silver">Silver Package</option>
                        <option value="gold">Gold Package</option>
                        <option value="platinum">Platinum Package</option>
                        <option value="other">Other/Custom/Not Sure</option>
                        
                    </select>
                    <div class="group">
                        <button>Send</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="footer">
            <div class="foot-wrapper">
                <p>LA | OC | SGV | SFV </p>
                <p>pouredmemories@gmail.com</p>
                <p>626.628.4881</p>
            </div>
        </div>
    </body>
</html>
