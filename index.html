<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Poured Memories, LLC</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Italiana&display=swap');
            :root {
                --color1: #AD8330;
                --color2: #3E3D3D;
            }
            
            body {
                margin: 0;
                padding: 0;
                font-family: "italiana", system-ui;
                font-weight: bold;
            }
            
            .hero {
                background-image: linear-gradient(rgba(230, 100, 0, 0.15)), url('https://images.squarespace-cdn.com/content/v1/6698834996b6057e16d61abc/1732769468439-3O5M6IFOBUPM75V6KXXK/unsplash-image-tFE-p8-kdwU.jpg');
                max-width: 100%;
                height: 100vh;
                background-size: cover;
                background-position:right 0px center;
                background-repeat: no-repeat;
                display: flex;
            }

            .content {
                position: absolute;
                margin: auto 30px;
                bottom: 100px;
                text-align: right;
                max-width: 450px;
                right: 0px;
            }

            .content h2 {
                color: var(--color2);
                font-size: 32pt;
                margin: 10px auto;
                line-height: 0.9;
            }

            .content h3 {
                color: white;
                margin: 10px auto;
            }

            .content button {
                background: none;
                border: white solid 1px;
                border-radius: 5px;
                color: white;
                font-size: 12pt;
            }

            .footer {
                display: flex;
                align-items: center;
                flex-direction: column;
                margin: 30px auto;
            }

            .footer p {
                margin: 0px auto;
                font-size: 10pt;
                color: var(--color1);
            }

            .navi {
                padding: 30px;
                display: flex;
                width: 100%;
                justify-content: space-between;
                flex-direction: row-reverse;
                max-height: 100px;
            }

            .navi input {
                display: none;
            }

            .navi label {
                filter: invert(1);
                z-index: 1000;
            }

            .navi input:checked ~ label {
                filter: invert(0);
                position:fixed;
            }

            .navi input:checked ~ .mobile-droplist {
                display: flex;
            }

            .navi input:checked ~ h1 {
                color: black;
                position: fixed;
                left: 30px;
            }
            
            .navi h1 {
                margin: 0px;
                color: white;
                font-size: 16pt;
                z-index: 1000;
            }

            .mobile-droplist {
                position: absolute;
                background: #E7CBBC; 
                height: 100vh;
                width: 100vw;
                display: none;
                z-index: 1;
                margin: -30px;
                justify-content: center;
                align-items: center;
            }

            .mobile-droplist ul {
                padding: 0;
                list-style: none;
            }

            .mobile-droplist li {
                margin: 30px auto;
                font-size: 24pt;
                text-align: center;
            }

            .mobile-droplist a {
                color: var(--color2);
                text-decoration: none;
            }

            @media (min-width: 800px) {
                .navi {
                    flex-direction: row;
                    align-items: center;
                    padding: 0 30px;
                }

                .navi h1 {
                    font-size: 24pt;
                    min-width: 300px;
                }
                
                .navi label {
                    display: none;
                }

                .mobile-droplist {
                    display: flex;
                    justify-content: left;
                    position: relative;
                    background: none;
                    width: 100%;
                    height: auto;
                    margin-left: 30px;
                    padding: 0px;
                }

                .mobile-droplist ul {
                    display: flex;
                    gap: 30px;
                }

                .mobile-droplist li {
                    font-size: 16pt;
                }

                .content h2 {
                    font-size: 40pt;
                }
            }

            @media (min-width: 1400px) {
                .content {
                    margin-right: 200px;
                }
            }
        </style>
    </head>
    <body>
        <div class="hero">
            <div class="navi">
                <input type="checkbox" id="toggle">
                <label for="toggle">
                    <img src="https://img.icons8.com/material-outlined/24/menu--v3.png" alt="toggle icon">
                </label>
                <h1>POURED MEMORIES</h1>
                <div class="mobile-droplist">
                    <ul>
                        <li><a href="/lvllc/" style="text-decoration: underline;"">Home</a></li>
                        <li><a href="/lvllc/about/">About</a></li>
                        <li><a href="/lvllc/services/">Services</a></li>
                        <li><a href="/lvllc/contact/">Contact</a></li>
                        <li><a href="/lvllc/gallery/">Gallery</a></li>
                    </ul>
                </div>
            </div>
            <div class="content">
                <h2>ADD A TOUCH OF <i>LUXURY</i> TO YOUR EVENT</h2>
                <h3><i>WE pour the drinks, YOU make the memories</i></h3>
                <a href="/lvllc/contact/"><button>Contact Us!</button></a>
            </div>
        </div>
        <div class="footer">
            <p>LA | OC | SGV | SFV </p>
            <p>pouredmemories@gmail.com</p>
            <p>626.628.4881</p>
        </div>
    </body>
</html>
